<!doctype html><html lang="sv"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin | Offroad Bumpis</title><link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png"><style>body{font-family:Arial,sans-serif;max-width:420px;margin:0 auto;padding:30px;background:#f7f7fb}.card{background:white;padding:24px;border-radius:16px;box-shadow:0 8px 28px rgba(0,0,0,.08)}input{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px}button{margin-top:14px;padding:11px 16px;border:0;border-radius:999px;background:#111827;color:white;font-weight:700}.error{background:#fee2e2;padding:10px;border-radius:10px}</style></head><body><div class="card"><h1>Admin</h1>{% if error %}<p class="error">{{ error }}</p>{% endif %}<form method="post"><label>Lösenord</label><input name="password" type="password" required><button>Logga in</button></form><p><small>Standardlösenord är change_me om du inte satt ADMIN_PASSWORD.</small></p></div></body></html>

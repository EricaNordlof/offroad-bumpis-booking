services:
  - type: web
    name: offroad-bumpis-booking
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: offroad-bumpis-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: kontakt@offroadbumpis.se
